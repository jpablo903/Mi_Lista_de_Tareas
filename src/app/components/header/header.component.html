<header>
    <h1 style="font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;">{{title}}</h1>
    <app-button 
        color="{{showAddTask ? 'red' : 'green'}}" 
        text="{{showAddTask ? 'Cerrar' : 'Agregar'}}"
        (btnClick)="toggleAddTask()"    
        *ngIf="hasRoute('/')"
        
        ></app-button>
</header>
